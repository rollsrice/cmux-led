<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32">
  <defs>
    <linearGradient id="treeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa653"/>
      <stop offset="100%" stop-color="#1f5e2d"/>
    </linearGradient>
    <radialGradient id="starGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fff7c8"/>
      <stop offset="60%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
  </defs>

  <!-- Tiered triangular tree top pointing right (sideways tree) -->
  <path d="M 2 6
           L 12 16
           L 2 26
           L 10 22
           L 18 16
           L 10 10 Z"
        fill="url(#treeGrad)"
        stroke="#163d1c"
        stroke-width="1"
        stroke-linejoin="round"/>

  <!-- Inner branch shading line -->
  <path d="M 4 8 L 12 16 L 4 24"
        stroke="#163d1c"
        stroke-width="0.6"
        fill="none"
        opacity="0.5"/>

  <!-- Star at tip -->
  <polygon
    points="30,8 32.4,13.5 38,14 33.5,17.7 35.1,23 30,20 24.9,23 26.5,17.7 22,14 27.6,13.5"
    fill="url(#starGrad)"
    stroke="#7a5a0a"
    stroke-width="0.8"
    stroke-linejoin="round"/>

  <!-- Star sparkle dot -->
  <circle cx="29" cy="13" r="0.9" fill="#ffffff" opacity="0.8"/>
</svg>
