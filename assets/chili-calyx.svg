<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#357a35"/>
    </linearGradient>
  </defs>

  <!-- 5-point calyx leaves radiating from base, attached at left edge of viewBox -->
  <polygon
    points="6,16  9.4,12.3  4,8  10.6,11.2  14,4  14.6,11.5  22,8  16.5,13.2  20,18  14.6,14.6  10.5,22  11.5,15"
    fill="url(#leafGrad)"
    stroke="#264d26"
    stroke-width="1"
    stroke-linejoin="round"/>

  <!-- Stem curving up-right -->
  <path d="M 14 6 Q 22 4 26 1"
        stroke="#6b3e1b"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>

  <!-- Tiny stem highlight -->
  <path d="M 18 4 Q 22 3 25 1.5"
        stroke="#a06a3a"
        stroke-width="1"
        stroke-linecap="round"
        fill="none"
        opacity="0.7"/>
</svg>
